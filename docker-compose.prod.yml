version: '3.8'

services:

  # VPN Bot Application
  vpn_bot:
    image: seriousnuts/vpn_bot:main
    container_name: vpn_bot_app_prod
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - vpn_bot_network

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: vpn_bot_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - vpn_bot
    restart: unless-stopped
    networks:
      - vpn_bot_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  vpn_bot_network:
    driver: bridge
